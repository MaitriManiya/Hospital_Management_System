<html>
<head>
</head>
<div>
  <div>
    <div>
        <h1>Register</h1>
    </div>
    <form action="#" method="POST">
        <table>
            <tr><td>First name:</td><td><input type="text" name="first name" placeholder="first name"></td></tr>
            <tr><td>Middle name:</td><td><input type="text" name="middle name" placeholder="middle name"></td></tr>
            <tr><td>Last name:</td><td><input type="text" name="last name" placeholder="last name"></td></tr>
            <tr><td>Gender:</td>
            <td>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label>
            </td></tr>
            <tr><td>Date of Birth:</td><td><input type="date" id="dob"></td></tr>
            <tr><td>Email:</td><td><input type="Email" name="Email" placeholder="Email"></td></tr>
            <tr><td>Address:</td><td><textarea rows="5" cols="50"></textarea></td></tr>
            <tr><td>Occupation Detail:</td><td><textarea name="ocup" rows="3" cols="30"></textarea></td></tr>
            <tr><td>Password:</td><td><input type="password1" id="password1" placeholder="password1"></td></tr>
            <tr><td>Re-type Password:</td><td><input type="password2" id="password2" placeholder="password2"></td></tr>
        </table><br><bR>
        <input type="submit"  value="Register">
    </form>

    <div >
      <a href="login.html">Login</a>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    </div>
  </div>
</div>
</html>
