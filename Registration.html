<!DOCTYPE html>
<html>
<head>
    <title>Registration Page</title>
    <link rel="stylesheet" type="text/css" href="mystyle.css">
</head>
<body>
<form name="sign" onsubmit="return validateform()">
    <div class="top_nav">
        <a href="logout.html">Logout</a>
        <a href="login.html">Login</a>
        <a href="profile.html">Profile</a>
        <a href="Registration.html">Sign Up</a>
        <a href="index.html">Home</a> 

    </div>
    <div class="container" style="height:auto;margin-left: 8%">
         <h1 style="text-align: center; margin-right: 130px;">Create an Account</h1>
        
        <table>
            <tr>
                <td>First Name:</td>
                <td class="high"><input type="text" name="fname" required></td>
            </tr>
            
            <tr>
                <td>Middle Name:</td>
                <td class="high"><input type="text" name="mname" required></td>
            </tr>
            
            <tr>
                <td>Last Name:</td>
                <td class="high"><input type="text" name="lname" required></td>
            </tr>
           
            <tr>
                <td>Gender:</td>
                <td>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other">Other</label>
                </td>
            </tr>
            <tr>
                <td>Date Of Birth: </td>
                <td class="high"><input type="date" name="dob" required></td>
            </tr>
            
            <tr>
                <td>Email Id:</td>
                <td class="high"><input type="email" name="email" required></td>
            </tr>
            
            <tr>
                <td>Address:</td>
                <td class="high"><input type="text" name="address" required></td>
            </tr>
           
            <tr>
                <td>Occupation Detail:</td>
                <td class="high"><input type="text" name="occu" required></td>
            </tr>
           
            <tr>
                <td>Password: </td>
                <td class="high"><input type="password" name="pass" required></td>
            </tr>
            
            <tr>
                <td>Confirm Password: </td>
                <td class="high"><input type="password" name="cpass" required></td>
            </tr>
            
            
            
            <tr>
                <td><a href="login.html" class="alreadyHave">Already Have an account?</a></td>
            </tr>
            <tr colspan="2">
                <!-- <td></td> -->
                <td><a href="index.html"><button class="submit">SignUp</button></a></td>
            </tr>
        </table>
</form>
</body>
</html>
<script>
        function validateform(){  
            //var username=document.sign.user.value;  
            var password=document.sign.pass.value;  
            var confirm_password=document.sign.cpass.value;  
            var email=document.sign.email.value;

            if(password.length<6)
            {  
              alert("Password must be at least 6 characters long.");  
              return false;  
            }
            else if(password!=confirm_password)    
            {  
              alert("Both password must be match!");  
              return false;  
            }    
            else if(email.indexOf("@") == -1 || email.length < 6){
                alert("Please Enter valid Email");
                return false;
            }
            //document.write("User Name:\t"+username+"<br>");
            document.write("Password:\t"+password+"<br>");
            document.write("Email:\t"+email+"<br>");
            alert("Form Submitted Successfully!");
            return true;
        }
    </script>
