<script>
        function validateform(){  

            var pid=document.case.pid.value;  
            var name=document.case.name.value;

           // var priscription=document.follow.priscription.value;  
            var disease=document.case.disease.value;
            if (pid==null || pid==""){  
              alert("Patient ID can't be blank");  
              return false;  
            }   
            if (name==null || name==""){  
              alert("name can't be blank");  
              return false;  
            }
            if (disease==null || disease==""){  
              alert("disease can't be blank");  
              return false;  
            }
            document.write("Patient ID:\t"+pid+"<br>");
            document.write("Name:\t"+name+"<br>");
            document.write("Disease:\t"+disease+"<br>");
            alert("Form Submitted Successfully!");
            return true;
        }
    </script>
