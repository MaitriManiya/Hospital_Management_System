    <div class="container">
         <h1 style="text-align: center; margin-right: 130px;">Admit Patient</h1>
        
        <table>
            <tr>
                <td>Name:</td>
                <td class="high"><input type="text" name="name" required></td>
            </tr>
            <tr>
                <td class="low"><input type="text" name="name" required></td>
            </tr>
            <tr>
                <td>Patient Id :</td>
                <td class="high"><input type="text" name="pid" required></td>
            </tr>
            <tr>
                <td class="low"><input type="text" name="pid" required></td>
            </tr>
            <tr>
                <td>Admit date: </td>
                <td class="high"><input type="date" name="adate" required></td>
            </tr>
            <tr>
                <td class="low"><input type="date" name="adate" required></td>
            </tr>
            <tr>
                <td><label for="Room Type">Choose a Room type:</label></td>
                <td>
                <select name="room" id="room">
                    <option value="*">select one</option>
                    <option value="Sharing ward">Sharing ward</option>
                    <option value="Special ward">Special ward</option>
                    <option value="Private Room">Private Room</option>
                    <option value="Delux Room">Delux Room</option>
                </select>
                </td>
            </tr>
            <tr>
                <td>Bad number:</td>
                <td class="high"><input type="text" name="bad" required></td>
            </tr>
            <tr>
                <td class="low"><input type="text name="bad" required></td>
            </tr>
            <tr>
                <td>Note: </td>
                <td class="high"><input type="text"  name="note" required></td>
            </tr>
            <tr>
                <td class="low"><input type="text"  name="note" required></td>
            </tr>
            
            
            <tr>
                <!-- <td></td> -->
                <td><a href="#"><button class="submit">Submit</button></a></td>
            </tr>
        </table>
