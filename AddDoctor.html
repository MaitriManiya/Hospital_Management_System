    <div class="container" style="height:auto;">
         <h1 style="text-align: center; margin-right: 130px;">Add Doctor</h1>
        
        <table>
            <tr>
                <td>Name:</td>
                <td class="high"><input type="text" name="name" required></td>
            </tr>
            <tr>
                <td class="low"><input type="text" name="name" required></td>
            </tr>
            <tr>
                <td>Doctor Id :</td>
                <td class="high"><input type="text" name="did" required></td>
            </tr>
            <tr>
                <td class="low"><input type="text" name="did" required></td>
            </tr>
            <tr>
                <td>Address:</td>
                <td class="high"><input type="text" name="address" required></td>
            </tr>
            <tr>
                <td class="low"><input type="text name="address" required></td>
            </tr>
            <tr>
                <td>Email Id: </td>
                <td class="high"><input type="email"  name="email" required></td>
            </tr>
            <tr>
                <td class="low"><input type="email"  name="email" required></td>
            </tr>
            <tr>
                <td>Contact No: </td>
                <td class="high"><input type="text" name="num" required></td>
            </tr>
            <tr>
                <td class="low"><input type="text" name="num" required></td>
            </tr>
            <tr>
                <td>Specialist: </td>
                <td class="high"><input type="text" name="spe" required></td>
            </tr>
            <tr>
                <td class="low"><input type="text" name="spe" required></td>
            </tr>
            <tr>
                <td>Password: </td>
                <td class="high"><input type="password" name="pass" required></td>
            </tr>
            <tr>
                <td class="low"><input type="password" name="pass" required></td>
            </tr>
            <tr>
                <td>Confirm Password: </td>
                <td class="high"><input type="password" name="cpass" required></td>
            </tr>
            <tr>
                <td class="low"><input type="password" name="cpass" required></td>
            </tr>
            <tr colspan="2">
                <!-- <td></td> -->
                <td><a href="#"><button class="submit">Add</button></a></td>
            </tr>
        </table>
</body>
